<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .balance-section {
            padding: 30px;
            text-align: center;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .balance {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .balance.positive {
            color: #27ae60;
        }

        .balance.negative {
            color: #e74c3c;
        }

        .income-expense {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .income-box, .expense-box {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .income-box {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
        }

        .expense-box {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .income-box h3, .expense-box h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .income-box span, .expense-box span {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .form-section {
            padding: 30px;
        }

        .form-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.3);
        }

        .transactions-section {
            padding: 30px;
            background: #f8f9fa;
        }

        .transactions-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }

        .transaction-list {
            list-style: none;
        }

        .transaction-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 5px solid transparent;
        }

        .transaction-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .transaction-item.income {
            border-left-color: #27ae60;
        }

        .transaction-item.expense {
            border-left-color: #e74c3c;
        }

        .transaction-details {
            flex: 1;
        }

        .transaction-description {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .transaction-category {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .transaction-amount {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .transaction-amount.income {
            color: #27ae60;
        }

        .transaction-amount.expense {
            color: #e74c3c;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 15px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .balance {
                font-size: 2.5rem;
            }

            .income-expense {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .transaction-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .transaction-amount {
                align-self: flex-end;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header, .balance-section, .form-section, .transactions-section {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .balance {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💰 Expense Tracker</h1>
            <p>Take control of your finances</p>
        </div>

        <!-- Balance Section -->
        <div class="balance-section">
            <div class="balance" id="balance">₹0.00</div>
            <div class="income-expense">
                <div class="income-box">
                    <h3>Income</h3>
                    <span id="income-total">₹0.00</span>
                </div>
                <div class="expense-box">
                    <h3>Expenses</h3>
                    <span id="expense-total">₹0.00</span>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <h2 class="form-title">Add New Transaction</h2>
            <form id="transaction-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Enter description..." required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="">Select Type</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <!-- Income Categories -->
                        <optgroup label="Income" id="income-categories" style="display: none;">
                            <option value="salary">Salary</option>
                            <option value="freelance">Freelance</option>
                            <option value="business">Business</option>
                            <option value="investment">Investment</option>
                            <option value="other-income">Other Income</option>
                        </optgroup>
                        <!-- Expense Categories -->
                        <optgroup label="Expenses" id="expense-categories" style="display: none;">
                            <option value="food">Food & Dining</option>
                            <option value="transport">Transportation</option>
                            <option value="shopping">Shopping</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="bills">Bills & Utilities</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="education">Education</option>
                            <option value="other-expense">Other Expense</option>
                        </optgroup>
                    </select>
                </div>
                <button type="submit" class="btn">Add Transaction</button>
            </form>
        </div>

        <!-- Transactions Section -->
        <div class="transactions-section">
            <h2 class="transactions-title">Recent Transactions</h2>
            <ul class="transaction-list" id="transaction-list">
                <div class="empty-state">
                    No transactions.Add your first transaction above!
                </div>
            </ul>
        </div>
    </div>

    <script>
        // Transaction data array
        let transactions = [];
        let nextId = 1;

        // DOM elements
        const form = document.getElementById('transaction-form');
        const typeSelect = document.getElementById('type');
        const categorySelect = document.getElementById('category');
        const transactionList = document.getElementById('transaction-list');
        const balanceEl = document.getElementById('balance');
        const incomeTotalEl = document.getElementById('income-total');
        const expenseTotalEl = document.getElementById('expense-total');

        // Category management
        typeSelect.addEventListener('change', function() {
            const incomeCategories = document.getElementById('income-categories');
            const expenseCategories = document.getElementById('expense-categories');
            
            categorySelect.value = '';
            
            if (this.value === 'income') {
                incomeCategories.style.display = 'block';
                expenseCategories.style.display = 'none';
            } else if (this.value === 'expense') {
                incomeCategories.style.display = 'none';
                expenseCategories.style.display = 'block';
            } else {
                incomeCategories.style.display = 'none';
                expenseCategories.style.display = 'none';
            }
        });

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const description = document.getElementById('description').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            
            if (description && amount && type && category) {
                addTransaction(description, amount, type, category);
                form.reset();
                typeSelect.dispatchEvent(new Event('change'));
            }
        });

        // Add transaction function
        function addTransaction(description, amount, type, category) {
            const transaction = {
                id: nextId++,
                description,
                amount: type === 'expense' ? -Math.abs(amount) : Math.abs(amount),
                type,
                category,
                date: new Date().toLocaleDateString()
            };
            
            transactions.unshift(transaction);
            updateUI();
        }

        // Delete transaction function
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateUI();
        }

        // Update UI function
        function updateUI() {
            updateBalance();
            renderTransactions();
        }

        // Update balance and totals
        function updateBalance() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const expenses = Math.abs(transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0));
            
            const balance = income - expenses;
            
            balanceEl.textContent = `₹${balance.toFixed(2)}`;
            balanceEl.className = `balance ${balance >= 0 ? 'positive' : 'negative'}`;
            
            incomeTotalEl.textContent = `₹${income.toFixed(2)}`;
            expenseTotalEl.textContent = `₹${expenses.toFixed(2)}`;
        }

        // Render transactions
        function renderTransactions() {
            if (transactions.length === 0) {
                transactionList.innerHTML = '<div class="empty-state">No transactions yet. Add your first transaction above!</div>';
                return;
            }
            
            transactionList.innerHTML = transactions.map(transaction => `
                <li class="transaction-item ${transaction.type}">
                    <div class="transaction-details">
                        <div class="transaction-description">${transaction.description}</div>
                        <div class="transaction-category">${getCategoryLabel(transaction.category)} • ${transaction.date}</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="transaction-amount ${transaction.type}">
                            ${transaction.type === 'income' ? '+' : ''}₹${Math.abs(transaction.amount).toFixed(2)}
                        </div>
                        <button class="delete-btn" onclick="deleteTransaction(${transaction.id})">×</button>
                    </div>
                </li>
            `).join('');
        }

        // Get category label
        function getCategoryLabel(category) {
            const labels = {
                salary: 'Salary',
                freelance: 'Freelance',
                business: 'Business',
                investment: 'Investment',
                'other-income': 'Other Income',
                food: 'Food & Dining',
                transport: 'Transportation',
                shopping: 'Shopping',
                entertainment: 'Entertainment',
                bills:'Bills & Utilities',
                healthcare: 'Healthcare',
                education: 'Education',
                'other-expense': 'Other Expense'
            };
            return labels[category] || category;
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
